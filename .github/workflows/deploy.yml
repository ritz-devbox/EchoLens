name: Automated Cloud Deployment

on:
  push:
    branches:
      - main # Triggers deployment automatically when code is pushed to the main branch

jobs:
  deploy:
    name: Build & Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: echolens-app
          region: us-east1
          source: . # This automatically builds the Dockerfile and deploys it
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Show Deployment URL
        run: echo "App successfully deployed to ${{ steps.deploy.outputs.url }}"
